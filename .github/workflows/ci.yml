name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Aetheria.slnx

      # Warnings are errors (see Directory.Build.props), so a clean build is a real gate.
      - name: Build
        run: dotnet build Aetheria.slnx -c Release --no-restore

      # M0 uses the MiniTest runner (a console app whose exit code is the pass/fail signal).
      # When tests migrate to xUnit (roadmap M1), replace this step with `dotnet test`.
      - name: Test
        run: dotnet run --project tests/Aetheria.Tests -c Release --no-build
